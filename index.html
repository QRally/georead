<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravel Crew Recce Pro v2.4</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff5500; --text: #e0e0e0; --success: #00ff41; --danger: #ff0000; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100svh; overflow: hidden; }
        
        #header { padding: 10px; background: #1a1a1a; display: flex; justify-content: space-between; border-bottom: 2px solid var(--accent); flex-shrink: 0; align-items: center; }
        #save-indicator { color: var(--success); font-size: 0.6rem; margin-left: 8px; transition: 0.3s; opacity: 0; }
        
        #odometer-section { padding: 10px 0; display: flex; flex-direction: column; align-items: center; background: #000; flex-shrink: 0; }
        #live-dist { font-size: 3.5rem; font-weight: 900; color: var(--success); line-height: 1; }
        
        #capture-btn { 
            background-color: var(--accent); color: white; border: none; width: 100%; height: 20vh; 
            font-size: 2rem; font-weight: 900; flex-shrink: 0; cursor: pointer; transition: 0.1s;
        }
        #capture-btn.recording { background-color: var(--danger); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #log-list { flex-grow: 1; overflow-y: auto; padding: 10px; background: #050505; display: flex; flex-direction: column; gap: 12px; }
        
        .log-item { 
            background: #1a1a1a; border-radius: 10px; padding: 12px; border-left: 5px solid var(--accent);
            display: grid; grid-template-columns: 1fr 65px; gap: 10px; align-items: center;
        }
        .log-time { font-size: 0.7rem; color: #555; margin-bottom: 4px; font-weight: bold; }
        .log-input { background: #222; border: 1px solid #444; color: white; padding: 14px; font-size: 1.1rem; border-radius: 6px; width: 100%; }
        
        .btn-play { height: 60px; width: 60px; border-radius: 10px; border: none; background: #333; color: var(--success); font-size: 1.4rem; }
        .btn-play.playing { background: var(--danger); color: white; }

        .toolbar { display: flex; background: #222; flex-shrink: 0; }
        .toolbar button { flex: 1; padding: 20px; border: none; color: white; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; border-right: 1px solid #333; }
    </style>
</head>
<body>

<div id="header">
    <div>GPS: <b id="acc">--</b>m <span id="save-indicator">● AUTO-SAVED</span></div>
    <div id="point-count">0 POINTS</div>
</div>

<div id="odometer-section">
    <div id="live-dist">0</div>
    <div style="font-size: 0.6rem; color: #555; letter-spacing: 1px;">METERS SINCE LAST</div>
</div>

<button id="capture-btn" onclick="handleCapture()">CAPTURE POINT</button>

<div id="log-list"></div>

<div class="toolbar">
    <button onclick="restoreBackup()" style="color:var(--accent)">Restore</button>
    <button onclick="deleteLast()" style="color:var(--danger)">Undo</button>
    <button onclick="exportData()" style="background: #1a3d1a; color: var(--success); border:none;">Export JSON</button>
</div>

<script>
    let log = [];
    let currentCoords = null;
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let currentPlayback = null;
    let currentPlayBtn = null;
    const R = 6371000;

    // Mic Setup
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            log[log.length - 1].audio = URL.createObjectURL(audioBlob);
            audioChunks = [];
            updateDisplay();
            autoSave();
        };
    }).catch(() => alert("Mic required for Voice Memos"));

    // GPS Watcher
    navigator.geolocation.watchPosition((pos) => {
        currentCoords = pos.coords;
        document.getElementById('acc').innerText = pos.coords.accuracy.toFixed(1);
        if (log.length > 0) {
            const last = log[log.length - 1];
            const d = getDist(last.lat, last.lng, pos.coords.latitude, pos.coords.longitude);
            document.getElementById('live-dist').innerText = Math.round(d);
        }
    }, null, { enableHighAccuracy: true });

    function getDist(lat1, lon1, lat2, lon2) {
        const rad = Math.PI / 180;
        const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(((lon2-lon1)*rad)/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // Auto-Save Logic
    function autoSave() {
        const backupData = log.map(({lat, lng, note, time}) => ({lat, lng, note, time}));
        localStorage.setItem('gravel_crew_backup', JSON.stringify(backupData));
        const si = document.getElementById('save-indicator');
        si.style.opacity = "1";
        setTimeout(() => { si.style.opacity = "0"; }, 800);
    }

    function restoreBackup() {
        const saved = localStorage.getItem('gravel_crew_backup');
        if (saved) {
            if (confirm("Restore points from previous session?")) {
                log = JSON.parse(saved).map(item => ({ ...item, audio: null }));
                updateDisplay();
            }
        } else { alert("No backup found."); }
    }

    function handleCapture() {
        const btn = document.getElementById('capture-btn');
        if (!isRecording) {
            if (!currentCoords) return;
            log.push({
                lat: currentCoords.latitude, lng: currentCoords.longitude, note: "",
                time: new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                audio: null
            });
            mediaRecorder.start();
            isRecording = true;
            btn.innerText = "STOP RECORDING";
            btn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "CAPTURE POINT";
            btn.classList.remove('recording');
        }
    }

    function toggleAudio(url, btn) {
        if (currentPlayback) {
            currentPlayback.pause();
            currentPlayBtn.innerText = "▶";
            currentPlayBtn.classList.remove('playing');
            if (currentPlayBtn === btn) { currentPlayback = null; return; }
        }
        const audio = new Audio(url);
        currentPlayback = audio; currentPlayBtn = btn;
        btn.innerText = "◼"; btn.classList.add('playing');
        audio.play();
        audio.onended = () => { btn.innerText = "▶"; btn.classList.remove('playing'); currentPlayback = null; };
    }

    function updateNote(index, value) { 
        log[index].note = value; 
        autoSave(); 
    }

    function updateDisplay() {
        document.getElementById('point-count').innerText = `${log.length} POINTS`;
        const listDiv = document.getElementById('log-list');
        listDiv.innerHTML = log.slice().reverse().map((e, i) => {
            const actualIndex = log.length - 1 - i;
            return `
                <div class="log-item">
                    <div>
                        <div class="log-time">${e.time}</div>
                        <input type="text" class="log-input" placeholder="Type Note..." value="${e.note}" oninput="updateNote(${actualIndex}, this.value)">
                    </div>
                    <button class="btn-play" onclick="toggleAudio('${e.audio}', this)" ${e.audio ? '' : 'disabled'}>▶</button>
                </div>
            `;
        }).join('');
    }

    function deleteLast() { if (confirm("Delete last?")) { log.pop(); autoSave(); updateDisplay(); } }

    function exportData() {
        if (log.length === 0) return;
        const cleanLog = log.map(({lat, lng, note}) => ({lat, lng, note}));
        const blob = new Blob([JSON.stringify(cleanLog, null, 2)], {type : 'application/json'});
        const dl = document.createElement('a');
        dl.href = URL.createObjectURL(blob);
        dl.download = `stage_PRO_${Date.now()}.json`;
        dl.click();
    }
    
    // Wake Lock
    if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
</script>
</body>
</html>
